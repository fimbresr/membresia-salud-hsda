version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hsda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hsda_memberships
      POSTGRES_USER: hsda_app
      POSTGRES_PASSWORD: hsda_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
